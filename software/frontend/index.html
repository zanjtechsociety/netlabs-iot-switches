<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT AC Dimmer Control</title>
    <!-- Using Tailwind CSS via CDN for quick styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for the bulb icon */
        .bulb-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
        }
        .bulb {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #4B5563; /* Default off state */
            position: absolute;
            top: 10px;
            left: 20px;
            transition: all 0.2s ease-in-out;
        }
        .bulb-base {
            width: 40px;
            height: 30px;
            background-color: #9CA3AF;
            border-radius: 0 0 10px 10px;
            position: absolute;
            bottom: 5px;
            left: 40px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-6 relative">
            <h1 class="text-2xl font-bold text-gray-800">Smart AC Dimmer</h1>
            <p id="status-indicator" class="text-sm text-gray-500 mt-1">Initializing...</p>
            <button id="settings-btn" class="absolute top-0 right-0 p-2 text-gray-400 hover:text-gray-600 transition-colors">
                <!-- SVG Settings Gear -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </div>

        <!-- Visual Bulb Representation -->
        <div class="bulb-container">
            <div id="bulb" class="bulb"></div>
            <div class="bulb-base"></div>
        </div>

        <!-- Controls -->
        <div class="space-y-6">
            <!-- Power Button -->
            <div class="flex justify-center">
                <button id="power-btn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-colors duration-200">
                    Turn OFF
                </button>
            </div>

            <!-- Brightness Slider -->
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <div class="flex justify-between items-center mb-2">
                    <label for="brightness-slider" class="text-gray-700 font-semibold">Brightness</label>
                    <span id="brightness-value" class="text-xl font-bold text-amber-500">50%</span>
                </div>
                <input 
                    type="range" 
                    id="brightness-slider" 
                    min="0" 
                    max="100" 
                    value="50"
                    class="w-full h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-amber-500"
                >
            </div>
        </div>

        <!-- Explanation Footer -->
        <div class="mt-8 text-xs text-gray-400 text-center border-t pt-4">
            Network simulation enabled. Check the browser console (F12) to see mock Fetch API logs.
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm m-4 transform transition-all">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Device Settings</h2>
            
            <div class="mb-4">
                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="checkbox" id="sim-toggle" class="form-checkbox h-5 w-5 text-amber-500 rounded border-gray-300 focus:ring-amber-500">
                    <span class="text-gray-700 font-medium">Use Simulation Mode</span>
                </label>
                <p class="text-xs text-gray-500 mt-1 ml-8">Toggle off to connect to real hardware.</p>
            </div>

            <div class="mb-6">
                <label for="ip-input" class="block text-sm font-medium text-gray-700 mb-1">ESP32 Base API URL</label>
                <input type="text" id="ip-input" placeholder="http://192.168.1.100/api" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-amber-500">
            </div>

            <div class="flex justify-end space-x-3">
                <button id="close-settings" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-md transition-colors">Cancel</button>
                <button id="save-settings" class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-md transition-colors shadow-md">Save & Reload</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 flex flex-col gap-2 z-50"></div>

    <!-- Application Logic (type="module" is required to use import/export) -->
    <script type="module" src="app.js"></script>
</body>
</html>
